[package]
name = "nvdaremote-server-rs"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.96"
config = "0.15.8"
derive_more = { version = "2.0.1", features = ["full"] }
futures = "0.3"
json-stream = "0.1.1"
rcgen = "0.13.2"
rustls = "0.23.23"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2.0.12"
tokio = { version = "1", features = ["full"] }
tokio-rustls = "0.26.2"
tokio-util = { version = "0.7.13", features = ["codec"] }
tracing = { version = "0.1.41", features = ["async-await", "attributes", "log"] }
tracing-subscriber = "0.3.19"

