services:
  rust-server:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      RUST_LOG: warn
    networks:
      - bench

  python-threaded:
    image: jmdaweb/nvda-remote-server:latest
    networks:
      - bench

  python-async:
    image: ghcr.io/a2hsh/nvda-remote:latest
    networks:
      - bench

  bench:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - rust-server
      - python-threaded
      - python-async
    entrypoint: ["/bin/sh", "-c", "sleep 5 && exec bench \"$$@\"", "--"]
    command:
      - --targets
      - rust=rust-server:6837,python-threaded=python-threaded:6837,python-async=python-async:6837
      - --ramp
      - "10,50,100,200,500,1000,2000,5000"
      - --messages
      - "5"
      - --timeout
      - "30"
    networks:
      - bench

networks:
  bench:
